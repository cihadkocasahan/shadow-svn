name: shadow-svn
version: "3"

networks:
  shadow-sync-net:
    driver: bridge

services:
  shadow-server:
    image: elleflorio/svn-server
    container_name: Shadow-Server
    restart: always
    ports:
      - "13080:80"
      - "3690:3690"
    hostname: shadow-server
    volumes:
      - ./data/svn:/home/svn
      - ./server/apache-servername.conf:/etc/apache2/conf.d/servername.conf:ro
    networks:
      - shadow-sync-net

  sync-engine:
    # Option A - Pull from GHCR (recommended for end users):
    # image: ghcr.io/cihadkocasahan/shadow-svn:latest
    # Option B - Build from source (default, for development):
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: Shadow-Sync-Engine
    restart: always
    ports:
      - "13081:80"
    environment:
      - SVN_USER=${SVN_USER}
      - SVN_PASS=${SVN_PASS}
      - TZ=Europe/Istanbul
    volumes:
      - ./data:/data
    networks:
      - shadow-sync-net
    depends_on:
      - shadow-server
